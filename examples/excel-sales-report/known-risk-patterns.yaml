schema_version: "1.0"
risks:
  - id: "mixed-date-formats"
    category: "input_format"
    source: "development_test"
    issue_reference: "DEV-EXCEL-014"
    summary: "混合日期格式导致部分记录被归入错误月份。"
    trigger_conditions:
      - "同一 sale_date 列同时包含 Excel 日期和文本日期"
    affected_result_units:
      - "normalized-sales-detail"
      - "monthly-sales-total"
    severity: "critical"
    detectability: "deterministic"
    validator_id: "validate-date-normalization"
    manual_gate: null
    on_detected: "low"
    on_unverified: "medium"
    regression_tests:
      - "tests/test_excel_confidence_validators.py"

  - id: "hidden-rows-omitted"
    category: "omission"
    source: "user_self_test"
    issue_reference: "UAT-EXCEL-008"
    summary: "输入工作表中的隐藏业务行未进入合并明细。"
    trigger_conditions:
      - "工作表存在隐藏行且业务规则要求纳入"
    affected_result_units:
      - "normalized-sales-detail"
      - "monthly-sales-total"
    severity: "critical"
    detectability: "deterministic"
    validator_id: "validate-record-count-conservation"
    manual_gate: null
    on_detected: "low"
    on_unverified: "medium"
    regression_tests:
      - "tests/test_excel_confidence_validators.py"

  - id: "report-number-mismatch"
    category: "reconciliation"
    source: "user_self_test"
    issue_reference: "UAT-REPORT-011"
    summary: "Word 经营报告中的销售数字与 Excel 汇总不一致。"
    trigger_conditions:
      - "报告中的指标值、月份或币种与来源指标不一致"
    affected_result_units:
      - "report-sales-metric"
    severity: "high"
    detectability: "deterministic"
    validator_id: "validate-cross-file-metric-consistency"
    manual_gate: null
    on_detected: "low"
    on_unverified: "medium"
    regression_tests:
      - "tests/test_excel_confidence_validators.py"
