schema_version: "1.0"
validators:
  - id: "validate-required-sections"
    name: "必要章节检查"
    type: "deterministic"
    implementation_status: "verified"
    implementation: "validators/validate_required_sections.py"
    applies_to:
      - "document-structure"
      - "action-recommendations"
    inputs:
      - "required_sections"
      - "document_sections"
    logic: "比较模板要求章节和文档非空章节。"
    pass_condition: "所有必要章节存在且非空。"
    fail_effect: "low"
    unavailable_effect: "medium"
    evidence_fields: ["missing_sections", "empty_sections", "message"]
    regression_tests: ["tests/test_word_confidence_validators.py"]

  - id: "validate-report-metrics"
    name: "报告指标来源一致性检查"
    type: "deterministic"
    implementation_status: "verified"
    implementation: "validators/validate_report_metrics.py"
    applies_to:
      - "factual-metrics"
    inputs:
      - "report_claims"
      - "source_metrics"
    logic: "按 metric_id 对比值、期间和单位。"
    pass_condition: "所有事实声明与来源指标一致。"
    fail_effect: "low"
    unavailable_effect: "medium"
    evidence_fields: ["mismatches", "message", "review_action"]
    regression_tests: ["tests/test_word_confidence_validators.py"]

  - id: "validate-period-alignment"
    name: "期间一致性检查"
    type: "deterministic"
    implementation_status: "verified"
    implementation: "validators/validate_period_alignment.py"
    applies_to:
      - "factual-metrics"
    inputs:
      - "claims"
    logic: "检查声明期间和来源期间是否一致。"
    pass_condition: "所有声明的 claim_period 等于 source_period。"
    fail_effect: "low"
    unavailable_effect: "medium"
    evidence_fields: ["mismatches", "message"]
    regression_tests: ["tests/test_word_confidence_validators.py"]

  - id: "validate-evidence-links"
    name: "结论证据链接检查"
    type: "deterministic"
    implementation_status: "verified"
    implementation: "validators/validate_evidence_links.py"
    applies_to:
      - "causal-analysis"
      - "action-recommendations"
    inputs:
      - "claims"
    logic: "检查每项结论或建议是否关联非空 evidence_refs。"
    pass_condition: "所有项至少包含一个证据引用。"
    fail_effect: "medium"
    unavailable_effect: "medium"
    evidence_fields: ["items_without_evidence", "message", "review_action"]
    regression_tests: ["tests/test_word_confidence_validators.py"]

  - id: "review-causal-support"
    name: "因果结论语义风险审查"
    type: "semantic_assist"
    implementation_status: "verified"
    implementation: "validators/review_causal_support.py"
    applies_to:
      - "causal-analysis"
    inputs:
      - "structured_semantic_review"
    logic: "读取受约束语义审查结果，定位 unsupported_causal_claim 风险。"
    pass_condition: "所有因果声明的 review_status 为 supported。"
    fail_effect: "medium"
    unavailable_effect: "medium"
    evidence_fields: ["risky_claims", "reason", "evidence", "review_action"]
    regression_tests: ["tests/test_word_confidence_validators.py"]

  - id: "validate-output-document-integrity"
    name: "Word 输出完整性检查"
    type: "deterministic"
    implementation_status: "verified"
    implementation: "validators/validate_output_document.py"
    applies_to:
      - "document-structure"
    inputs:
      - "document_path"
    logic: "检查文档路径存在且文件非空。"
    pass_condition: "文档存在且大小大于零。"
    fail_effect: "medium"
    unavailable_effect: "medium"
    evidence_fields: ["path", "message"]
    regression_tests: ["tests/test_word_confidence_validators.py"]
