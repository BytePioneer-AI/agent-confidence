schema_version: "1.0"
agent:
  id: "word-management-report-agent"
  name: "Word 经营分析报告 Agent"
  version: "1.0.0"
  owner: "Business Analytics Engineering"
  description: "读取结构化经营指标，生成包含事实、趋势、原因和建议的 Word 报告。"

supported_scope:
  inputs:
    - "包含 metric_id、period、value、source_ref 的结构化经营指标"
    - "固定章节模板和业务要求清单"
  outputs:
    - "Word 经营分析报告及句子到来源的证据映射"
  assumptions:
    - "事实数字必须引用唯一指标和期间"
    - "因果结论必须显式关联支持证据"
  exclusions:
    - "缺少底层指标来源的自由文本分析"
    - "需要法律、合规或对外披露审批的报告"

result_units:
  - id: "document-structure"
    description: "报告章节和必要内容完整性"
    location: "management_report.docx#document"
    criticality: "high"
    acceptance_criteria:
      - "所有模板要求的章节都存在且非空"
    dependencies: []
    required_validators:
      - "validate-required-sections"
    optional_validators:
      - "validate-output-document-integrity"
    maximum_level_when_unverified: "medium"

  - id: "factual-metrics"
    description: "报告中的数值、期间、单位与数据源一致"
    location: "management_report.docx#事实陈述"
    criticality: "critical"
    acceptance_criteria:
      - "每个事实数字与唯一来源指标一致"
      - "期间和单位匹配"
    dependencies: []
    required_validators:
      - "validate-report-metrics"
      - "validate-period-alignment"
    optional_validators: []
    maximum_level_when_unverified: "medium"

  - id: "causal-analysis"
    description: "报告中的原因和因果分析"
    location: "management_report.docx#原因分析"
    criticality: "high"
    acceptance_criteria:
      - "每个因果结论都有可追溯证据"
      - "语义审查未发现将相关性误写为因果性"
    dependencies:
      - "factual-metrics"
    required_validators:
      - "validate-evidence-links"
      - "review-causal-support"
    optional_validators: []
    maximum_level_when_unverified: "medium"

  - id: "action-recommendations"
    description: "行动建议与分析证据的关联"
    location: "management_report.docx#行动建议"
    criticality: "medium"
    acceptance_criteria:
      - "每条建议都关联至少一个已验证事实或结论"
    dependencies:
      - "causal-analysis"
    required_validators:
      - "validate-evidence-links"
    optional_validators: []
    maximum_level_when_unverified: "medium"

grading_policy:
  high_requires:
    - "all_required_validators_pass"
    - "no_critical_risk_detected"
    - "within_supported_scope"
    - "evidence_traceable"
  downgrade_rules:
    - condition: "any_critical_validator_fail"
      level: "low"
      action: "block_or_mandatory_review"
    - condition: "required_validator_unavailable"
      level: "medium"
      action: "targeted_review"
    - condition: "outside_supported_scope"
      level: "low"
      action: "block_or_manual_gate"
    - condition: "general_known_risk_detected"
      level: "medium"
      action: "targeted_review"
  aggregation:
    critical_result_low: "overall_low"
    critical_result_medium: "overall_at_most_medium"
    required_validation_incomplete: "overall_not_high"
    use_numeric_average: false
