schema_version: "1.0"
risks:
  - id: "missing-required-section"
    category: "requirement_coverage"
    source: "development_test"
    issue_reference: "DEV-WORD-005"
    summary: "报告在部分输入下漏掉行动建议章节。"
    trigger_conditions:
      - "生成文档未包含模板要求的章节或章节为空"
    affected_result_units:
      - "document-structure"
      - "action-recommendations"
    severity: "high"
    detectability: "deterministic"
    validator_id: "validate-required-sections"
    manual_gate: null
    on_detected: "low"
    on_unverified: "medium"
    regression_tests:
      - "tests/test_word_confidence_validators.py"

  - id: "metric-source-mismatch"
    category: "reconciliation"
    source: "user_self_test"
    issue_reference: "UAT-WORD-012"
    summary: "报告数字引用了错误月份的指标。"
    trigger_conditions:
      - "事实陈述中的值、期间或单位与来源指标不一致"
    affected_result_units:
      - "factual-metrics"
      - "causal-analysis"
    severity: "critical"
    detectability: "deterministic"
    validator_id: "validate-report-metrics"
    manual_gate: null
    on_detected: "low"
    on_unverified: "medium"
    regression_tests:
      - "tests/test_word_confidence_validators.py"

  - id: "unsupported-causal-claim"
    category: "unsupported_claim"
    source: "user_self_test"
    issue_reference: "UAT-WORD-019"
    summary: "报告把销售下降直接归因于客户需求减弱，但没有客户需求数据。"
    trigger_conditions:
      - "因果表述没有关联支持该原因的证据"
      - "语义审查将结论标记为 unsupported_causal_claim"
    affected_result_units:
      - "causal-analysis"
      - "action-recommendations"
    severity: "high"
    detectability: "semantic_assist"
    validator_id: "review-causal-support"
    manual_gate: null
    on_detected: "medium"
    on_unverified: "medium"
    regression_tests:
      - "tests/test_word_confidence_validators.py"
